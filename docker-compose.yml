services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: trader_tracker
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p1234"]
      interval: 5s
      timeout: 5s
      retries: 10

  back:
    build: ./back
    restart: unless-stopped
    env_file:
      - ./back/.env
    environment:
      DB_HOST: db
      FRONTEND_URL: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - ./back:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  front:
    build: ./front
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./front:/usr/share/nginx/html:ro
    depends_on:
      - back

volumes:
  mysql_data: